<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalog - Browse 200k+ Products</title>
  <meta name="description" content="Browse our extensive product catalog with real-time search, filters, and smooth pagination" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    
    /* Improved animations */
    .card-enter {
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
      animation-delay: calc(var(--stagger) * 30ms);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    
    .modal-enter { animation: modalSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes modalSlide {
      from { opacity: 0; transform: translateY(100%) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    @media (min-width: 640px) {
      @keyframes modalSlide {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
    }
    
    /* Hide scrollbar for chips */
    .chips::-webkit-scrollbar { display: none; }
    .chips { scrollbar-width: none; }
    
    /* Smooth transitions */
    * { -webkit-tap-highlight-color: transparent; }
    
    /* Gradient backgrounds */
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    /* Pulse animation for loading */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-screen" x-data="catalog()" x-init="init()" x-cloak>

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/60 sticky top-0 z-20 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center gap-4 h-16">

        <!-- Logo -->
        <div class="flex items-center gap-2.5 shrink-0">
          <div class="w-9 h-9 gradient-bg rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <div class="hidden sm:block">
            <span class="font-bold text-slate-900 tracking-tight text-lg">Catalog</span>
            <p class="text-xs text-slate-500 -mt-0.5">Browse 200k+ products</p>
          </div>
          <span class="sm:hidden font-bold text-slate-900 tracking-tight">Catalog</span>
        </div>

        <!-- Search -->
        <div class="flex-1 max-w-xl mx-auto relative group">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none group-focus-within:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
          </svg>
          <input
            type="search"
            x-model="search"
            placeholder="Search products by name..."
            class="w-full pl-10 pr-10 py-2.5 text-sm bg-slate-100 border border-slate-200 rounded-xl focus:outline-none focus:bg-white focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition-all placeholder:text-slate-400"
          />
          <div x-show="search" class="absolute right-3 top-1/2 -translate-y-1/2">
            <button @click="search=''" class="w-5 h-5 rounded-full bg-slate-300 hover:bg-slate-400 flex items-center justify-center text-white transition-colors">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>

        <!-- Stats badge -->
        <div x-show="loaded > 0" class="shrink-0 hidden lg:flex items-center gap-2 px-3 py-1.5 bg-indigo-50 border border-indigo-100 rounded-full">
          <div class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></div>
          <span class="text-xs font-semibold text-indigo-700 tabular-nums" x-text="`${loaded.toLocaleString()}`"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Filter bar ─────────────────────────────────────────────────────────── -->
  <div class="bg-white/90 backdrop-blur-md border-b border-slate-200/60 sticky top-16 z-10 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center gap-3 py-3.5">

        <!-- Category chips with scroll fade -->
        <div class="relative flex-1">
          <div class="chips flex items-center gap-2 overflow-x-auto pb-1">
            <button
              @click="setCategory('')"
              class="shrink-0 text-xs font-semibold px-4 py-2 rounded-full border-2 transition-all duration-200 transform hover:scale-105"
              :class="selectedCategory === '' ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white border-transparent shadow-lg shadow-indigo-500/30' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:text-indigo-600 hover:shadow-md'"
            >
              <span class="flex items-center gap-1.5">
                <span>🌟</span>
                <span>All</span>
              </span>
            </button>
            <template x-for="cat in categories" :key="cat">
              <button
                @click="setCategory(cat)"
                class="shrink-0 text-xs font-semibold px-4 py-2 rounded-full border-2 transition-all duration-200 transform hover:scale-105"
                :class="selectedCategory === cat ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white border-transparent shadow-lg shadow-indigo-500/30' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:text-indigo-600 hover:shadow-md'"
              >
                <span class="flex items-center gap-1.5">
                  <span x-text="cat(cat).emoji"></span>
                  <span x-text="cat"></span>
                </span>
              </button>
            </template>
          </div>
          <!-- Fade effect for scrollable area -->
          <div class="pointer-events-none absolute right-0 top-0 bottom-0 w-12 bg-gradient-to-l from-white/90 to-transparent"></div>
        </div>

        <!-- Sort dropdown -->
        <div class="relative shrink-0">
          <select
            x-model="sortBy"
            class="appearance-none text-xs font-medium border-2 border-slate-200 rounded-xl pl-3 pr-8 py-2 bg-white text-slate-700 hover:border-indigo-300 focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 cursor-pointer transition-all"
          >
            <option value="default">⏱️ Newest</option>
            <option value="price_asc">💰 Price: Low → High</option>
            <option value="price_desc">💎 Price: High → Low</option>
            <option value="name_asc">🔤 Name: A → Z</option>
          </select>
          <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- Error banner with animation -->
    <div x-show="error" x-transition class="mb-6 flex items-center gap-3 bg-gradient-to-r from-red-50 to-rose-50 border-2 border-red-200 text-red-700 rounded-2xl px-5 py-4 text-sm shadow-lg">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-red-600" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="font-semibold mb-0.5">Error loading products</p>
        <p class="text-xs opacity-90" x-text="error"></p>
      </div>
      <button @click="error=''" class="w-8 h-8 rounded-lg hover:bg-red-100 flex items-center justify-center text-red-400 hover:text-red-600 transition-colors">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
    </div>

    <!-- Enhanced skeleton with shimmer effect -->
    <div x-show="firstLoad && loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
      <template x-for="i in 12" :key="i">
        <div class="bg-white rounded-3xl border-2 border-slate-100 overflow-hidden shadow-sm">
          <div class="h-40 bg-gradient-to-br from-slate-100 to-slate-50 animate-pulse"></div>
          <div class="p-5 space-y-3">
            <div class="h-2.5 bg-slate-100 rounded-full w-1/3 animate-pulse"></div>
            <div class="h-4 bg-slate-100 rounded-full w-4/5 animate-pulse"></div>
            <div class="h-3 bg-slate-100 rounded-full w-1/2 animate-pulse"></div>
            <div class="h-6 bg-slate-100 rounded-full w-1/4 mt-2 animate-pulse"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Enhanced product grid -->
    <div x-show="!firstLoad || !loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
      <template x-for="(p, index) in visibleProducts" :key="p.id">
        <div
          @click="openModal(p)"
          class="bg-white rounded-3xl border-2 border-slate-100 overflow-hidden hover:border-indigo-200 hover:shadow-2xl hover:shadow-indigo-100/50 hover:-translate-y-1 transition-all duration-300 cursor-pointer group card-enter"
          :style="`--stagger: ${index % 12}`"
        >
          <!-- Gradient accent bar -->
          <div class="h-2 bg-gradient-to-r" :class="cat(p.category).accent"></div>
          
          <!-- Product visual -->
          <div class="h-36 flex items-center justify-center relative overflow-hidden" :class="cat(p.category).bg">
            <div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent"></div>
            <span class="text-5xl select-none transform group-hover:scale-110 transition-transform duration-300 relative z-10" x-text="cat(p.category).emoji"></span>
          </div>
          
          <!-- Product info -->
          <div class="p-5">
            <span class="inline-flex items-center gap-1.5 text-xs font-bold px-2.5 py-1 rounded-full mb-3" :class="cat(p.category).badge">
              <span x-text="cat(p.category).emoji" class="text-[10px]"></span>
              <span x-text="p.category"></span>
            </span>
            <h3 class="text-sm font-bold text-slate-800 leading-snug mb-2 line-clamp-2 group-hover:text-indigo-600 transition-colors min-h-[2.5rem]" x-text="p.name"></h3>
            <div class="flex items-center justify-between mb-3">
              <p class="text-xs text-slate-400 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span x-text="relativeTime(p.updated_at)"></span>
              </p>
            </div>
            <div class="flex items-center justify-between pt-3 border-t border-slate-100">
              <p class="text-lg font-black text-slate-900" x-text="fmt(p.price)"></p>
              <button class="w-8 h-8 rounded-lg bg-indigo-50 group-hover:bg-indigo-600 flex items-center justify-center transition-colors">
                <svg class="w-4 h-4 text-indigo-600 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Enhanced empty state -->
    <div x-show="!loading && visibleProducts.length === 0 && !firstLoad" x-transition class="flex flex-col items-center justify-center py-32">
      <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-slate-100 to-slate-50 flex items-center justify-center mb-6 shadow-inner">
        <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
        </svg>
      </div>
      <h3 class="font-bold text-slate-700 text-lg mb-2">No products found</h3>
      <p class="text-sm text-slate-500 mb-6 max-w-xs text-center" x-text="search ? `No results for \"${search}\"` : 'Try selecting a different category'"></p>
      <button x-show="search || selectedCategory" @click="search=''; setCategory('')" class="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-semibold rounded-xl shadow-lg shadow-indigo-500/30 transition-all transform hover:scale-105">
        Clear filters
      </button>
    </div>

    <!-- Enhanced load more section -->
    <div class="mt-12 flex flex-col items-center gap-4">
      <button
        x-show="hasMore && !search"
        @click="loadMore()"
        :disabled="loading"
        class="group px-10 py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-2xl transition-all flex items-center gap-3 shadow-xl shadow-indigo-500/30 disabled:shadow-none"
      >
        <svg x-show="loading && !firstLoad" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
        <span x-text="loading && !firstLoad ? 'Loading...' : 'Load more products'"></span>
        <svg x-show="!loading" class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      
      <div x-show="!hasMore && loaded > 0 && !search" class="flex items-center gap-3 px-6 py-3 bg-gradient-to-r from-green-50 to-emerald-50 border-2 border-green-200 rounded-2xl">
        <svg class="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span class="text-sm font-semibold text-green-700">
          All <span class="font-black" x-text="loaded.toLocaleString()"></span> products loaded!
        </span>
      </div>
      
      <p x-show="search && visibleProducts.length > 0" class="text-sm text-slate-500">
        <span class="font-bold text-indigo-600" x-text="visibleProducts.length.toLocaleString()"></span>
        <span x-text="visibleProducts.length === 1 ? 'result' : 'results'"></span> found
      </p>
    </div>
  </main>

  <!-- ── Enhanced Product Modal ────────────────────────────────────────────────── -->
  <div
    x-show="modal !== null"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click.self="modal = null"
    @keydown.escape.window="modal = null"
    class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/70 backdrop-blur-md"
  >
    <div
      x-show="modal !== null"
      x-transition:enter="modal-enter"
      class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full sm:max-w-md overflow-hidden transform"
      @click.stop
    >
      <template x-if="modal !== null">
        <div>
          <!-- Gradient header -->
          <div class="h-3 bg-gradient-to-r" :class="cat(modal.category).accent"></div>
          
          <!-- Product image area -->
          <div class="h-56 flex items-center justify-center relative overflow-hidden" :class="cat(modal.category).bg">
            <div class="absolute inset-0 bg-gradient-to-br from-white/30 to-transparent"></div>
            <span class="text-8xl select-none relative z-10 animate-pulse" x-text="cat(modal.category).emoji"></span>
            <button @click="modal = null" class="absolute top-4 right-4 w-10 h-10 rounded-2xl bg-white/90 hover:bg-white backdrop-blur-sm flex items-center justify-center text-slate-600 hover:text-slate-900 transition-all shadow-lg hover:shadow-xl z-20 group">
              <svg class="w-5 h-5 group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          
          <!-- Product details -->
          <div class="p-6 sm:p-8">
            <div class="flex items-start justify-between gap-4 mb-4">
              <span class="inline-flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-xl" :class="cat(modal.category).badge">
                <span x-text="cat(modal.category).emoji"></span>
                <span x-text="modal.category"></span>
              </span>
              <span class="text-xs text-slate-400 flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span x-text="relativeTime(modal.updated_at)"></span>
              </span>
            </div>
            
            <h2 class="text-xl font-black text-slate-900 leading-tight mb-6" x-text="modal.name"></h2>
            
            <!-- Product meta -->
            <div class="grid grid-cols-2 gap-4 p-5 bg-gradient-to-br from-slate-50 to-transparent rounded-2xl border-2 border-slate-100">
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1.5">Price</p>
                <p class="text-3xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent" x-text="fmt(modal.price)"></p>
              </div>
              <div class="text-right">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1.5">Product ID</p>
                <p class="text-xs font-mono text-slate-600 break-all" x-text="modal.id.split('-')[0] + '...'"></p>
              </div>
            </div>
            
            <!-- Action button -->
            <button class="w-full mt-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/30 hover:shadow-2xl hover:shadow-indigo-500/40 transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
              <span>Add to Cart</span>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script>
    const API = '';

    const CATS = {
      Electronics: { badge: 'bg-blue-100 text-blue-700',     accent: 'bg-blue-500',    bg: 'bg-blue-50',    emoji: '💻' },
      Clothing:    { badge: 'bg-pink-100 text-pink-700',     accent: 'bg-pink-500',    bg: 'bg-pink-50',    emoji: '👕' },
      Books:       { badge: 'bg-amber-100 text-amber-700',   accent: 'bg-amber-500',   bg: 'bg-amber-50',   emoji: '📚' },
      Sports:      { badge: 'bg-green-100 text-green-700',   accent: 'bg-green-500',   bg: 'bg-green-50',   emoji: '⚽' },
      Home:        { badge: 'bg-orange-100 text-orange-700', accent: 'bg-orange-500',  bg: 'bg-orange-50',  emoji: '🏠' },
      Beauty:      { badge: 'bg-rose-100 text-rose-700',     accent: 'bg-rose-500',    bg: 'bg-rose-50',    emoji: '✨' },
      Toys:        { badge: 'bg-purple-100 text-purple-700', accent: 'bg-purple-500',  bg: 'bg-purple-50',  emoji: '🎮' },
      Food:        { badge: 'bg-lime-100 text-lime-700',     accent: 'bg-lime-500',    bg: 'bg-lime-50',    emoji: '🍎' },
      Automotive:  { badge: 'bg-slate-100 text-slate-700',   accent: 'bg-slate-500',   bg: 'bg-slate-100',  emoji: '🚗' },
      Health:      { badge: 'bg-teal-100 text-teal-700',     accent: 'bg-teal-500',    bg: 'bg-teal-50',    emoji: '❤️' },
    };
    const DEFAULT_CAT = { badge: 'bg-gray-100 text-gray-600', accent: 'bg-gray-400', bg: 'bg-gray-50', emoji: '📦' };

    function catalog() {
      return {
        products:         [],
        categories:       [],
        selectedCategory: '',
        sortBy:           'default',
        search:           '',
        cursor:           null,
        hasMore:          true,
        loading:          false,
        firstLoad:        true,
        loaded:           0,
        error:            '',
        modal:            null,

        get visibleProducts() {
          let list = this.products;
          if (this.search) {
            const q = this.search.toLowerCase();
            list = list.filter(p => p.name.toLowerCase().includes(q));
          }
          if (this.sortBy === 'price_asc')  return [...list].sort((a, b) => a.price - b.price);
          if (this.sortBy === 'price_desc') return [...list].sort((a, b) => b.price - a.price);
          if (this.sortBy === 'name_asc')   return [...list].sort((a, b) => a.name.localeCompare(b.name));
          return list;
        },

        async init() {
          await this.fetchCategories();
          await this.loadMore();
        },

        async fetchCategories() {
          try {
            const res = await fetch(`${API}/products/categories`);
            this.categories = (await res.json()).categories;
          } catch { /* non-critical */ }
        },

        setCategory(cat) {
          this.selectedCategory = cat;
          this.search  = '';
          this.sortBy  = 'default';
          this.reset();
        },

        reset() {
          this.products  = [];
          this.cursor    = null;
          this.hasMore   = true;
          this.loaded    = 0;
          this.firstLoad = true;
          this.loadMore();
        },

        async loadMore() {
          if (this.loading || !this.hasMore) return;
          this.loading = true;
          this.error   = '';
          try {
            const params = new URLSearchParams({ limit: 24 });
            if (this.cursor)           params.set('cursor',   this.cursor);
            if (this.selectedCategory) params.set('category', this.selectedCategory);
            const res = await fetch(`${API}/products?${params}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            this.products.push(...data.products);
            this.cursor   = data.next_cursor;
            this.hasMore  = data.has_more;
            this.loaded  += data.count;
          } catch (e) {
            this.error = `Failed to load products: ${e.message}`;
          } finally {
            this.loading   = false;
            this.firstLoad = false;
          }
        },

        openModal(p) { this.modal = p; },

        cat(category) { return CATS[category] || DEFAULT_CAT; },

        fmt(price) {
          return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(price);
        },

        relativeTime(iso) {
          const diff = Date.now() - new Date(iso).getTime();
          const mins = Math.floor(diff / 60000);
          if (mins < 60)  return `${mins}m ago`;
          const hrs = Math.floor(mins / 60);
          if (hrs < 24)   return `${hrs}h ago`;
          return `${Math.floor(hrs / 24)}d ago`;
        },
      };
    }
  </script>
</body>
