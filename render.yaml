services:
  - type: web
    name: product-catalog-api
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGINS
        value: "*"
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
